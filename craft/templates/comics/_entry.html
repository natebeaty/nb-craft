{% extends (craft.request.isAjax and not craft.request.isLivePreview) ? "_ajax-layout" : "_layout" %}

{% block content %}
	<article class="comic modal-content" data-page="{{ entry.url|replace((siteUrl), '/') }}" data-page-title="{{ entry.title }}">
		<h1>{{ entry.title }}</h1>
		{% for image in entry.comicPages %}
			<img src="{{ image.getUrl() }}" alt="{{ entry.title }}">
		{% endfor %}
	</article>
{% endblock %}
