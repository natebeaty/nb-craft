{% extends (craft.request.isAjax and not craft.request.isLivePreview) ? "_ajax-layout" : "_layout" %}
{% set title = "Journal" %}

{% block content %}
	<section class="journal-list page-content" data-page="/journal" data-page-title="{{ title }}">
		{% for entry in craft.entries.section('journal').limit(5) %}
			{% include "journal/_article" with {'modalClass': ''}  %}
		{% endfor %}
	</section>
{% endblock %}
